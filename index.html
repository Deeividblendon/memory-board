<!doctype html>
<html lang="pt-br">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Board | Álbum de Memórias</title>

    <link rel="stylesheet" href="styles/index.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <nav>
        <a href="#" id="logo"
          ><img src="assets/logo/savewhatmatters.jpg" alt="logotipo"
        /></a>

        <ul id="menu">
          <li>
            <a href="#"
              ><img src="assets/icons/lupa.png" alt="ícone de lupa"
            /></a>
          </li>
          <li><a href="#">Explorar</a></li>
          <li><a href="#">Memórias</a></li>
          <li>
            <a href="#"
              ><img
                src="assets/Deeivid-Memory-Profile.jpg"
                alt="Foto de Perfil"
            /></a>
          </li>
        </ul>
      </nav>
      <header>
        <div id="profile">
          <img src="assets/Deeivid-Memory-Profile.jpg" alt="Foto de Perfil" />

          <div>
            <h1>Deeivid Blendon</h1>
            <p>Guardar memórias é um modo de pausar o tempo.</p>
            <p>
              As lembranças funcionam como raízes que nutrem a nossa identidade
              e nos permitem reviver, com afeto, os capítulos mais bonitos da
              nossa história.
            </p>
          </div>
        </div>

        <ul id="info">
          <li>
            <img
              src="assets/icons/mapas-e-bandeiras.png"
              alt="ícone de localização"
            />
            <span>Juazeiro do Norte, CE</span>
          </li>

          <li>
            <img src="assets/icons/amigos.png" alt="ícone de pessoas" /><span
              >Pessoas</span
            >
          </li>

          <li>
            <img
              src="assets/icons/galeria-de-fotos.png"
              alt="ícone de fotos"
            /><span>28 Fotos</span>
          </li>
        </ul>
      </header>
    </div>
  </body>
</html>
